<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Badminton Tournament – Live Brackets</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --ink:#111;
  --muted:#555;
  --line:#d9dee7;
  --win:#eafaf0;
  --win-border:#9fdfb3;
}

body{
  font-family:system-ui,Segoe UI,Arial,sans-serif;
  margin:18px;
  background:var(--bg);
  color:var(--ink);
}

.wrap{
  max-width:1900px;
  margin:0 auto;
}

h1{
  margin:0 0 6px;
}

.sub{
  margin:0 0 14px;
  color:var(--muted);
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:14px 0;
}

.tab{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--card);
  cursor:pointer;
}

.tab.active{
  border-color:#333;
  font-weight:600;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
}

.meta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-top:10px;
  color:var(--muted);
  font-size:.95rem;
}

.pill{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:#1e3a8a;
}

.section-title{
  margin:0 0 12px;
  font-size:1.1rem;
}

.bracket-grid{
  display:flex;
  gap:36px;
  align-items:flex-start;
  overflow-x:auto;
  padding-bottom:12px;
}

.round-col{
  min-width:250px;
  flex:0 0 250px;
}

.round-col h3{
  margin:0 0 12px;
  font-size:1rem;
  color:#334155;
  text-align:center;
}

.matches-wrap{
  position:relative;
}

.match-pos{
  position:absolute;
  left:0;
  right:0;
}

.match{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 1px 1px rgba(0,0,0,.03);
}

.team{
  padding:10px 12px;
  border-bottom:1px solid #eef2f7;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  min-height:22px;
}

.team:last-child{
  border-bottom:none;
}

.team.win{
  background:var(--win);
  border-left:4px solid var(--win-border);
  padding-left:8px;
}

.winner-mark{
  font-weight:700;
  color:#15803d;
}

.match-footer{
  padding:8px 12px;
  font-size:.85rem;
  color:#64748b;
  border-top:1px solid #eef2f7;
  background:#fafbfd;
}

.small{
  color:var(--muted);
  font-size:.9rem;
}

.legend{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.dot{
  width:10px;
  height:10px;
  border-radius:999px;
  display:inline-block;
  margin-right:6px;
}

.dot.win{ background:#22c55e; }
.dot.pending{ background:#94a3b8; }

.error{
  padding:10px;
  border:1px solid #fecaca;
  background:#fff1f2;
  border-radius:10px;
  color:#991b1b;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>🏸 Badminton Tournament – Live Brackets</h1>
  <p class="sub">Auto-refreshes every 30 seconds. Showing <b>school names only</b>.</p>

  <div class="tabs" id="tabs"></div>

  <div class="card">
    <div class="meta">
      <span class="pill" id="lastUpdated">Loading…</span>
      <span class="legend small">
        <span><span class="dot win"></span>Winner chosen</span>
        <span><span class="dot pending"></span>Not decided</span>
      </span>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Winners Bracket</h2>
    <div id="winnersContent"></div>
  </div>

  <div class="card">
    <h2 class="section-title">Losers Bracket</h2>
    <div id="losersContent"></div>
  </div>

  <div class="card">
    <h2 class="section-title">Grand Final</h2>
    <div id="finalContent"></div>
  </div>
</div>

<script>
const DIV_KEYS = [
  "Boys Singles",
  "Girls Singles",
  "Boys Doubles",
  "Girls Doubles",
  "Mixed Doubles"
];

let results = null;
let activeDiv = DIV_KEYS[0];

const MATCH_HEIGHT = 110;
const ROUND1_GAP = 16;

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function el(tag, attrs = {}, html = ""){
  const n = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => n.setAttribute(k, v));
  if(html) n.innerHTML = html;
  return n;
}

function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  DIV_KEYS.forEach(key => {
    const t = el("div", { class: "tab" + (key === activeDiv ? " active" : "") });
    t.textContent = key;
    t.onclick = () => {
      activeDiv = key;
      renderTabs();
      render();
    };
    tabs.appendChild(t);
  });
}

function classifyRounds(matches){
  const winners = {};
  const losers = {};
  const finals = {};

  for(const m of matches){
    const r = m.round || "Round";

    if(r.startsWith("W")){
      if(!winners[r]) winners[r] = [];
      winners[r].push(m);
    } else if(r.startsWith("L")){
      if(!losers[r]) losers[r] = [];
      losers[r].push(m);
    } else {
      if(!finals[r]) finals[r] = [];
      finals[r].push(m);
    }
  }

  return {
    winners: sortRoundGroups(winners),
    losers: sortRoundGroups(losers),
    finals: sortRoundGroups(finals)
  };
}

function sortRoundGroups(obj){
  return Object.keys(obj)
    .sort((a, b) => {
      const parse = s => {
        const n = parseInt(s.replace(/[^\d]/g, ""), 10);
        return Number.isNaN(n) ? 999 : n;
      };
      return parse(a) - parse(b);
    })
    .map(key => ({ round: key, matches: obj[key] }));
}

function renderTeam(name, winner){
  return `
    <div class="team ${winner ? "win" : ""}">
      <span>${escapeHtml(name || "TBD")}</span>
      <span class="winner-mark">${winner ? "W" : ""}</span>
    </div>
  `;
}

function renderMatch(match){
  const winner = match.winner || null;
  const aWin = winner && winner === match.team1;
  const bWin = winner && winner === match.team2;

  return `
    <div class="match">
      ${renderTeam(match.team1, aWin)}
      ${renderTeam(match.team2, bWin)}
      <div class="match-footer">
        Winner: ${winner ? escapeHtml(winner) : "—"}
      </div>
    </div>
  `;
}

function buildPredecessorMap(matches){
  const predMap = {};

  matches.forEach(m => {
    if(m.nextWin && m.nextWin.matchId){
      if(!predMap[m.nextWin.matchId]) predMap[m.nextWin.matchId] = [];
      predMap[m.nextWin.matchId].push(m.id);
    }
    if(m.nextLose && m.nextLose.matchId){
      if(!predMap[m.nextLose.matchId]) predMap[m.nextLose.matchId] = [];
      predMap[m.nextLose.matchId].push(m.id);
    }
  });

  return predMap;
}

function buildMatchMap(matches){
  const map = {};
  matches.forEach(m => {
    map[m.id] = m;
  });
  return map;
}

function computeAllPositions(matches){
  const positions = {};
  const predMap = buildPredecessorMap(matches);
  const matchMap = buildMatchMap(matches);

  const winnersR1 = matches.filter(m => m.round === "W1");
  winnersR1.forEach((m, i) => {
    positions[m.id] = i * (MATCH_HEIGHT + ROUND1_GAP);
  });

  const visiting = new Set();

  function getPosition(matchId){
    if(positions[matchId] !== undefined) return positions[matchId];
    if(visiting.has(matchId)) return 0;

    visiting.add(matchId);

    const match = matchMap[matchId];
    const preds = predMap[matchId] || [];
    const predPositions = preds
      .map(id => getPosition(id))
      .filter(v => v !== undefined && v !== null);

    let y;

    if(predPositions.length >= 2){
      y = predPositions.reduce((a, b) => a + b, 0) / predPositions.length;
    } else if(predPositions.length === 1){
      y = predPositions[0];
    } else {
      const sameRound = matches.filter(m => m.round === match.round);
      const index = sameRound.findIndex(m => m.id === matchId);
      y = Math.max(0, index) * (MATCH_HEIGHT + ROUND1_GAP);
    }

    positions[matchId] = y;
    visiting.delete(matchId);
    return y;
  }

  matches.forEach(m => getPosition(m.id));
  return positions;
}

function renderBracketSection(containerId, roundGroups, emptyMessage, allMatches){
  const container = document.getElementById(containerId);

  if(roundGroups.length === 0){
    container.innerHTML = `<div class="small">${emptyMessage}</div>`;
    return;
  }

  const positionsById = computeAllPositions(allMatches);
  const grid = el("div", { class: "bracket-grid" });

  const ys = [];
  roundGroups.forEach(group => {
    group.matches.forEach(match => {
      if(positionsById[match.id] !== undefined){
        ys.push(positionsById[match.id]);
      }
    });
  });

  const baseHeight = ys.length ? Math.max(...ys) + MATCH_HEIGHT : MATCH_HEIGHT;

  roundGroups.forEach(group => {
    const col = el("div", { class: "round-col" });
    col.appendChild(el("h3", {}, escapeHtml(group.round === "GF" ? "Grand Final" : group.round)));

    const matchesWrap = el("div", { class: "matches-wrap" });
    matchesWrap.style.height = `${baseHeight}px`;

    group.matches.forEach(match => {
      const wrapper = document.createElement("div");
      wrapper.className = "match-pos";
      wrapper.style.top = `${positionsById[match.id] || 0}px`;
      wrapper.innerHTML = renderMatch(match);
      matchesWrap.appendChild(wrapper);
    });

    col.appendChild(matchesWrap);
    grid.appendChild(col);
  });

  container.innerHTML = "";
  container.appendChild(grid);
}

function render(){
  const winnersContent = document.getElementById("winnersContent");
  const losersContent = document.getElementById("losersContent");
  const finalContent = document.getElementById("finalContent");

  if(!results){
    winnersContent.innerHTML = `<div class="error">No results loaded yet.</div>`;
    losersContent.innerHTML = `<div class="small">No results loaded yet.</div>`;
    finalContent.innerHTML = `<div class="small">No results loaded yet.</div>`;
    return;
  }

  const div = results[activeDiv];
  if(!div){
    winnersContent.innerHTML = `<div class="error">Division not found</div>`;
    losersContent.innerHTML = "";
    finalContent.innerHTML = "";
    return;
  }

  const matches = div.matches || [];
  const grouped = classifyRounds(matches);

  renderBracketSection(
    "winnersContent",
    grouped.winners,
    "No winners bracket matches yet.",
    matches
  );

  renderBracketSection(
    "losersContent",
    grouped.losers,
    "No losers bracket matches yet.",
    matches
  );

  renderBracketSection(
    "finalContent",
    grouped.finals,
    "No final yet.",
    matches
  );

  document.getElementById("lastUpdated").textContent =
    results._meta?.updatedAt
      ? `Updated: ${results._meta.updatedAt}`
      : "Updated: (timestamp missing)";
}

async function loadResults(){
  try{
    const r = await fetch("results_public.json?cb=" + Date.now(), { cache: "no-store" });
    if(!r.ok) throw new Error("HTTP " + r.status);

    results = await r.json();
    renderTabs();
    render();
  }catch(e){
    document.getElementById("winnersContent").innerHTML =
      `<div class="error">
        <b>Could not load results_public.json</b><br>
        Make sure viewer.html and results_public.json are in the same folder.
      </div>`;
    document.getElementById("losersContent").innerHTML = "";
    document.getElementById("finalContent").innerHTML = "";
  }
}

loadResults();
setInterval(loadResults, 30000);
</script>
</body>
</html>
