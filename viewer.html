<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Badminton Tournament – Live Brackets</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#fff;
  --ink:#111;
  --muted:#555;
  --line:#d9dee7;
  --win:#eafaf0;
  --win-border:#9fdfb3;
  --connector:#94a3b8;
}

*{ box-sizing:border-box; }

body{
  font-family:system-ui,Segoe UI,Arial,sans-serif;
  margin:14px;
  background:var(--bg);
  color:var(--ink);
  font-size:14px;
}

.wrap{
  max-width:1850px;
  margin:0 auto;
}

h1{
  margin:0 0 6px;
  font-size:1.5rem;
}

.sub{
  margin:0 0 12px;
  color:var(--muted);
}

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:12px 0;
}

.tab{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--card);
  cursor:pointer;
  font-size:.95rem;
}

.tab.active{
  border-color:#333;
  font-weight:600;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  margin-bottom:14px;
  overflow-x:auto;
}

.meta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  color:var(--muted);
  font-size:.92rem;
}

.pill{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:#1e3a8a;
}

.section-title{
  margin:0 0 10px;
  font-size:1rem;
}

.bracket-grid{
  display:flex;
  gap:20px;
  align-items:flex-start;
  min-width:max-content;
  padding-bottom:6px;
  position:relative;
}

.round-col{
  width:210px;
  min-width:210px;
  flex:0 0 210px;
  position:relative;
}

.round-col h3{
  margin:0 0 8px;
  font-size:.9rem;
  color:#334155;
  text-align:center;
}

.matches-wrap{
  position:relative;
}

.connectors{
  position:absolute;
  left:0;
  top:0;
  pointer-events:none;
  overflow:visible;
  z-index:0;
}

.connector-path{
  stroke:var(--connector);
  stroke-width:2;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.match-pos{
  position:absolute;
  left:0;
  right:0;
  z-index:1;
}

.match{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 1px 1px rgba(0,0,0,.03);
}

.match-label{
  padding:5px 9px;
  font-size:.72rem;
  font-weight:700;
  color:#334155;
  background:#f8fafc;
  border-bottom:1px solid #e2e8f0;
}

.team{
  padding:7px 9px;
  border-bottom:1px solid #eef2f7;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  min-height:18px;
  font-size:.8rem;
}

.team:last-child{
  border-bottom:none;
}

.team.win{
  background:var(--win);
  border-left:4px solid var(--win-border);
  padding-left:5px;
}

.winner-mark{
  font-weight:700;
  color:#15803d;
  flex:0 0 auto;
}

.match-footer{
  padding:6px 9px;
  font-size:.72rem;
  color:#64748b;
  border-top:1px solid #eef2f7;
  background:#fafbfd;
}

.small{
  color:var(--muted);
  font-size:.88rem;
}

.legend{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.dot{
  width:10px;
  height:10px;
  border-radius:999px;
  display:inline-block;
  margin-right:6px;
}

.dot.win{ background:#22c55e; }
.dot.pending{ background:#94a3b8; }

.error{
  padding:10px;
  border:1px solid #fecaca;
  background:#fff1f2;
  border-radius:10px;
  color:#991b1b;
}

.placeholder{
  color:#64748b;
  font-style:italic;
}

@media (max-width: 900px){
  .round-col{
    width:185px;
    min-width:185px;
    flex-basis:185px;
  }
}
</style>
</head>

<body>
<div class="wrap">
  <h1>🏸 Badminton Tournament – Live Brackets</h1>
  <p class="sub">Auto-refreshes every 30 seconds. Showing <b>school names only</b>.</p>

  <div class="tabs" id="tabs"></div>

  <div class="card">
    <div class="meta">
      <span class="pill" id="lastUpdated">Loading…</span>
      <span class="legend small">
        <span><span class="dot win"></span>Winner chosen</span>
        <span><span class="dot pending"></span>Not decided</span>
      </span>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Winners Bracket + Grand Final</h2>
    <div id="winnersContent"></div>
  </div>

  <div class="card">
    <h2 class="section-title">Losers Bracket</h2>
    <div id="losersContent"></div>
  </div>
</div>

<script>
const DIV_KEYS = [
  "Boys Singles",
  "Girls Singles",
  "Boys Doubles",
  "Girls Doubles",
  "Mixed Doubles"
];

let results = null;
let activeDiv = DIV_KEYS[0];
let currentShellSize = 0;

const MATCH_HEIGHT = 96;
const WINNERS_ROUND1_STEP = 128;
const COL_WIDTH = 210;
const COL_GAP = 20;

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function el(tag, attrs = {}, html = ""){
  const n = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => n.setAttribute(k, v));
  if(html) n.innerHTML = html;
  return n;
}

function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  DIV_KEYS.forEach(key=>{
    const t = el("div", { class:"tab" + (key === activeDiv ? " active" : "") });
    t.textContent = key;
    t.onclick = ()=>{
      activeDiv = key;
      renderTabs();
      render();
    };
    tabs.appendChild(t);
  });
}

function classifyRounds(matches){
  const winners = {};
  const losers = {};
  const finals = {};

  for(const m of matches){
    const r = m.round || "Round";

    if(r.startsWith("W")){
      if(!winners[r]) winners[r] = [];
      winners[r].push(m);
    }else if(r.startsWith("L")){
      if(!losers[r]) losers[r] = [];
      losers[r].push(m);
    }else{
      if(!finals[r]) finals[r] = [];
      finals[r].push(m);
    }
  }

  return {
    winners: sortRoundGroups(winners),
    losers: sortRoundGroups(losers),
    finals: sortRoundGroups(finals)
  };
}

function sortRoundGroups(obj){
  return Object.keys(obj)
    .sort((a,b)=>{
      const parse = s => {
        if(s === "GF") return 999;
        const n = parseInt(s.replace(/[^\d]/g, ""), 10);
        return Number.isNaN(n) ? 999 : n;
      };
      return parse(a) - parse(b);
    })
    .map(key => ({ round:key, matches:obj[key] }));
}

function getFeedLabel(matches, matchId, slotNumber){
  for(const source of matches){
    if(
      source.nextWin &&
      source.nextWin.matchId === matchId &&
      Number(source.nextWin.slot) === Number(slotNumber)
    ){
      return `Winner of ${source.id}`;
    }

    if(
      source.nextLose &&
      source.nextLose.matchId === matchId &&
      Number(source.nextLose.slot) === Number(slotNumber)
    ){
      return `Loser of ${source.id}`;
    }
  }

  return "Pending";
}

function getDisplayName(matches, match, slotNumber){
  const actualName = slotNumber === 1 ? match.team1 : match.team2;

  const isEmpty =
    actualName === null ||
    actualName === undefined ||
    actualName === "" ||
    String(actualName).trim().toUpperCase() === "TBD";

  if(!isEmpty){
    return { text: actualName, placeholder: false };
  }

  return {
    text: getFeedLabel(matches, match.id, slotNumber),
    placeholder: true
  };
}

function renderTeam(display, winner){
  return `
    <div class="team ${winner ? "win" : ""}">
      <span class="${display.placeholder ? "placeholder" : ""}">${escapeHtml(display.text)}</span>
      <span class="winner-mark">${winner ? "W" : ""}</span>
    </div>
  `;
}

function matchLabel(match){
  if(match.id === "GF-1") return "Grand Final";
  if(match.id === "GF-2") return "Grand Final Reset";
  return match.id;
}

function renderMatch(matches, match){
  const team1Display = getDisplayName(matches, match, 1);
  const team2Display = getDisplayName(matches, match, 2);

  const winner = match.winner || null;
  const aWin = winner && winner === match.team1;
  const bWin = winner && winner === match.team2;

  return `
    <div class="match">
      <div class="match-label">${escapeHtml(matchLabel(match))}</div>
      ${renderTeam(team1Display, aWin)}
      ${renderTeam(team2Display, bWin)}
      <div class="match-footer">
        Winner: ${winner ? escapeHtml(winner) : "—"}
      </div>
    </div>
  `;
}

function getWinnersTop(roundIndex, matchIndex){
  const step = WINNERS_ROUND1_STEP * Math.pow(2, roundIndex);
  const offset = WINNERS_ROUND1_STEP * (Math.pow(2, roundIndex) - 1) / 2;
  return offset + (matchIndex * step);
}

function getLosersTop(match, shellSize){
  const S = WINNERS_ROUND1_STEP;

  if(shellSize === 16){
    const map16 = {
      "L1-1": 0.5 * S,
      "L1-2": 2.5 * S,
      "L1-3": 6.5 * S,
      "L1-4": 8.5 * S,

      "L2-1": 1.0 * S,
      "L2-2": 3.0 * S,
      "L2-3": 6.0 * S,
      "L2-4": 8.0 * S,

      "L3-1": 2.0 * S,
      "L3-2": 7.0 * S,

      "L4-1": 3.0 * S,
      "L4-2": 8.0 * S,

      "L5-1": 5.5 * S,
      "L6-1": 4.25 * S
    };
    if(map16[match.id] !== undefined) return map16[match.id];
  }

  if(shellSize === 8){
    const map8 = {
      "L1-1": 1.5 * S,
      "L1-2": 5.5 * S,
      "L2-1": 2.5 * S,
      "L2-2": 6.5 * S,
      "L3-1": 4.5 * S,
      "L4-1": 4.5 * S
    };
    if(map8[match.id] !== undefined) return map8[match.id];
  }

  if(shellSize === 4){
    const map4 = {
      "L1-1": 2.5 * S,
      "L2-1": 3.0 * S
    };
    if(map4[match.id] !== undefined) return map4[match.id];
  }

  return 0;
}

function getFinalTop(winnerGroups){
  const lastWinnerRoundIndex = Math.max(0, winnerGroups.length - 1);
  return getWinnersTop(lastWinnerRoundIndex, 0);
}

function getSectionHeight(roundGroups, type, winnerGroups = []){
  if(roundGroups.length === 0) return MATCH_HEIGHT;

  let tallest = MATCH_HEIGHT;

  roundGroups.forEach((group, roundIndex)=>{
    let maxTop = 0;

    group.matches.forEach((match, matchIndex)=>{
      let top = 0;

      if(type === "winners"){
        top = getWinnersTop(roundIndex, matchIndex);
      }else if(type === "losers"){
        top = getLosersTop(match, currentShellSize);
      }else{
        top = getFinalTop(winnerGroups);
      }

      if(top > maxTop) maxTop = top;
    });

    const total = maxTop + MATCH_HEIGHT;
    if(total > tallest) tallest = total;
  });

  return tallest;
}

function buildPredMap(matches){
  const predMap = {};
  for(const m of matches){
    if(m.nextWin?.matchId){
      if(!predMap[m.nextWin.matchId]) predMap[m.nextWin.matchId] = [];
      predMap[m.nextWin.matchId].push({ sourceId:m.id, type:"win", slot:m.nextWin.slot });
    }
    if(m.nextLose?.matchId){
      if(!predMap[m.nextLose.matchId]) predMap[m.nextLose.matchId] = [];
      predMap[m.nextLose.matchId].push({ sourceId:m.id, type:"lose", slot:m.nextLose.slot });
    }
  }
  return predMap;
}

function buildPositionMapForCombined(winnerGroups, finalGroups){
  const map = {};
  winnerGroups.forEach((group, roundIndex)=>{
    group.matches.forEach((match, matchIndex)=>{
      map[match.id] = {
        col: roundIndex,
        top: getWinnersTop(roundIndex, matchIndex)
      };
    });
  });

  const gfCol = winnerGroups.length;
  finalGroups.forEach(group=>{
    group.matches.forEach(match=>{
      map[match.id] = {
        col: gfCol,
        top: getFinalTop(winnerGroups)
      };
    });
  });

  return map;
}

function buildPositionMapForLosers(loserGroups){
  const map = {};
  loserGroups.forEach((group, roundIndex)=>{
    group.matches.forEach(match=>{
      map[match.id] = {
        col: roundIndex,
        top: getLosersTop(match, currentShellSize)
      };
    });
  });
  return map;
}

function pathBetween(sourcePos, targetPos){
  const sourceX = sourcePos.col * (COL_WIDTH + COL_GAP) + COL_WIDTH;
  const sourceY = sourcePos.top + MATCH_HEIGHT / 2;

  const targetX = targetPos.col * (COL_WIDTH + COL_GAP);
  const targetY = targetPos.top + MATCH_HEIGHT / 2;

  const midX = (sourceX + targetX) / 2;

  return `M ${sourceX} ${sourceY} L ${midX} ${sourceY} L ${midX} ${targetY} L ${targetX} ${targetY}`;
}

function renderConnectorSvg(totalWidth, totalHeight, paths){
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "connectors");
  svg.setAttribute("width", totalWidth);
  svg.setAttribute("height", totalHeight);
  svg.setAttribute("viewBox", `0 0 ${totalWidth} ${totalHeight}`);

  paths.forEach(d=>{
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", d);
    p.setAttribute("class", "connector-path");
    svg.appendChild(p);
  });

  return svg;
}

function renderCombinedWinnersAndFinal(containerId, winnerGroups, finalGroups, emptyMessage, matches){
  const container = document.getElementById(containerId);

  const visibleFinalGroups = finalGroups
    .map(group => ({
      ...group,
      matches: group.matches.filter(m => m.id !== "GF-2" || (m.team1 && m.team2))
    }))
    .filter(group => group.matches.length > 0);

  if(winnerGroups.length === 0 && visibleFinalGroups.length === 0){
    container.innerHTML = `<div class="small">${emptyMessage}</div>`;
    return;
  }

  const combinedGroups = [...winnerGroups, ...visibleFinalGroups];
  const grid = el("div", { class:"bracket-grid" });
  const sectionHeight = Math.max(
    getSectionHeight(winnerGroups, "winners"),
    visibleFinalGroups.length ? getSectionHeight(visibleFinalGroups, "finals", winnerGroups) : MATCH_HEIGHT,
    getFinalTop(winnerGroups) + MATCH_HEIGHT
  );

  const positionMap = buildPositionMapForCombined(winnerGroups, visibleFinalGroups);
  const predMap = buildPredMap(matches);

  combinedGroups.forEach((group, combinedIndex)=>{
    const col = el("div", { class:"round-col" });
    col.appendChild(el("h3", {}, escapeHtml(group.round === "GF" ? "Grand Final" : group.round)));

    const wrap = el("div", { class:"matches-wrap" });
    wrap.style.height = `${sectionHeight}px`;

    group.matches.forEach((match, matchIndex)=>{
      let top = 0;

      if(group.round === "GF"){
        top = getFinalTop(winnerGroups);
      } else {
        top = getWinnersTop(combinedIndex, matchIndex);
      }

      const holder = document.createElement("div");
      holder.className = "match-pos";
      holder.style.top = `${top}px`;
      holder.innerHTML = renderMatch(matches, match);
      wrap.appendChild(holder);
    });

    col.appendChild(wrap);
    grid.appendChild(col);
  });

  const totalWidth = combinedGroups.length * COL_WIDTH + (combinedGroups.length - 1) * COL_GAP;
  const paths = [];

  for(const targetId in predMap){
    if(!positionMap[targetId]) continue;
    for(const pred of predMap[targetId]){
      if(positionMap[pred.sourceId]){
        paths.push(pathBetween(positionMap[pred.sourceId], positionMap[targetId]));
      }
    }
  }

  grid.appendChild(renderConnectorSvg(totalWidth, sectionHeight, paths));

  container.innerHTML = "";
  container.appendChild(grid);
}

function renderLosersSection(containerId, loserGroups, emptyMessage, matches){
  const container = document.getElementById(containerId);

  if(loserGroups.length === 0){
    container.innerHTML = `<div class="small">${emptyMessage}</div>`;
    return;
  }

  const grid = el("div", { class:"bracket-grid" });
  const sectionHeight = getSectionHeight(loserGroups, "losers");
  const positionMap = buildPositionMapForLosers(loserGroups);
  const predMap = buildPredMap(matches);

  loserGroups.forEach((group)=>{
    const col = el("div", { class:"round-col" });
    col.appendChild(el("h3", {}, escapeHtml(group.round)));

    const wrap = el("div", { class:"matches-wrap" });
    wrap.style.height = `${sectionHeight}px`;

    group.matches.forEach(match=>{
      const top = getLosersTop(match, currentShellSize);

      const holder = document.createElement("div");
      holder.className = "match-pos";
      holder.style.top = `${top}px`;
      holder.innerHTML = renderMatch(matches, match);
      wrap.appendChild(holder);
    });

    col.appendChild(wrap);
    grid.appendChild(col);
  });

  const totalWidth = loserGroups.length * COL_WIDTH + (loserGroups.length - 1) * COL_GAP;
  const paths = [];

  for(const targetId in predMap){
    if(!positionMap[targetId]) continue;
    for(const pred of predMap[targetId]){
      if(positionMap[pred.sourceId]){
        paths.push(pathBetween(positionMap[pred.sourceId], positionMap[targetId]));
      }
    }
  }

  grid.appendChild(renderConnectorSvg(totalWidth, sectionHeight, paths));

  container.innerHTML = "";
  container.appendChild(grid);
}

function render(){
  const winnersContent = document.getElementById("winnersContent");
  const losersContent = document.getElementById("losersContent");

  if(!results){
    winnersContent.innerHTML = `<div class="error">No results loaded yet.</div>`;
    losersContent.innerHTML = `<div class="small">No results loaded yet.</div>`;
    return;
  }

  const div = results[activeDiv];
  if(!div){
    winnersContent.innerHTML = `<div class="error">Division not found</div>`;
    losersContent.innerHTML = "";
    return;
  }

  const matches = div.matches || [];
  currentShellSize = div.shellSize || 0;

  const grouped = classifyRounds(matches);

  renderCombinedWinnersAndFinal(
    "winnersContent",
    grouped.winners,
    grouped.finals,
    "No winners bracket matches yet.",
    matches
  );

  renderLosersSection(
    "losersContent",
    grouped.losers,
    "No losers bracket matches yet.",
    matches
  );

  document.getElementById("lastUpdated").textContent =
    results._meta?.updatedAt
      ? `Updated: ${results._meta.updatedAt}`
      : "Updated: (timestamp missing)";
}

async function loadResults(){
  try{
    const r = await fetch("results_public.json?cb=" + Date.now(), { cache:"no-store" });
    if(!r.ok) throw new Error("HTTP " + r.status);

    results = await r.json();
    renderTabs();
    render();
  }catch(e){
    document.getElementById("winnersContent").innerHTML =
      `<div class="error">
        <b>Could not load results_public.json</b><br>
        Make sure viewer.html and results_public.json are in the same folder.
      </div>`;
    document.getElementById("losersContent").innerHTML = "";
  }
}

loadResults();
setInterval(loadResults, 30000);
</script>
</body>
</html>
